<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WAVE VI – SGS Supplier Portal</title>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.2/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script type="module" crossorigin src="./assets/main-V3QDqsM6.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/main-CiJLJ26B.css">
</head>
<body>

<!-- Login Screen -->
<div id="loginScreen" class="login-screen">
  <div class="login-card">
    <div class="login-brand">
      <img src="./logo-wave-vi.png" alt="WAVE VI" class="logo-image login-logo">
      <h1>WAVE VI</h1>
      <p>SGS Supplier Portal</p>
    </div>
    <form id="loginForm" class="login-form">
      <div class="mb-3">
        <label class="form-label" for="loginUser">Username</label>
        <input type="text" class="form-control" id="loginUser" autocomplete="username" required placeholder="wavevi or sgs">
      </div>
      <div class="mb-3">
        <label class="form-label" for="loginPass">Password</label>
        <input type="password" class="form-control" id="loginPass" autocomplete="current-password" required placeholder="Password">
      </div>
      <div id="loginError" class="alert alert-danger py-2 small d-none" role="alert"></div>
      <button type="submit" class="btn btn-primary w-100 login-submit">
        <i class="fa-solid fa-right-to-bracket me-2"></i>Sign In
      </button>
    </form>
  </div>
</div>

<!-- App Shell (hidden until login) -->
<div id="appShell" class="d-none">

<aside id="sidebar" class="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-logo">
      <img src="./logo-wave-vi.png" alt="WAVE VI" class="logo-image">
      <div class="logo-text">
        <span class="logo-main">WAVE VI</span>
        <span class="logo-sub">Supplier Portal</span>
      </div>
    </div>
    <button class="btn sidebar-toggle-btn d-lg-none" id="sidebarClose" type="button">
      <i class="fa fa-times"></i>
    </button>
  </div>

  <nav class="sidebar-nav">
    <div class="nav-section-label">MAIN MENU</div>
    <a href="#dashboard" class="nav-item nav-link active" data-page="dashboard">
      <i class="fa-solid fa-gauge-high nav-icon"></i>
      <span class="nav-label">Dashboard</span>
    </a>
    <a href="#products" class="nav-item nav-link" data-page="products">
      <i class="fa-solid fa-box-open nav-icon"></i>
      <span class="nav-label">Product Catalog</span>
    </a>
    <a href="#purchase-orders" class="nav-item nav-link" data-page="purchase-orders">
      <i class="fa-solid fa-file-invoice nav-icon"></i>
      <span class="nav-label">Purchase Orders</span>
    </a>
    <a href="#deliveries" class="nav-item nav-link" data-page="deliveries">
      <i class="fa-solid fa-truck nav-icon"></i>
      <span class="nav-label">Deliveries</span>
    </a>
    <a href="#payments" class="nav-item nav-link" data-page="payments">
      <i class="fa-solid fa-credit-card nav-icon"></i>
      <span class="nav-label">Payments</span>
    </a>

    <div class="nav-section-label mt-3">RESOURCES</div>
    <a href="#documents" class="nav-item nav-link" data-page="documents">
      <i class="fa-solid fa-folder-open nav-icon"></i>
      <span class="nav-label">Documents</span>
    </a>

    <div class="nav-section-label mt-3 admin-only">SYSTEM</div>
    <a href="#settings" class="nav-item nav-link admin-only" data-page="settings" id="settingsNav">
      <i class="fa-solid fa-gear nav-icon"></i>
      <span class="nav-label">Settings</span>
    </a>
  </nav>

  <div class="sidebar-footer">
    <div class="supplier-badge">
      <div class="supplier-avatar">
        <i class="fa-solid fa-print"></i>
      </div>
      <div class="supplier-info">
        <span class="supplier-name" id="sidebarUserName">SGS Printing</span>
        <span class="supplier-role" id="sidebarUserRole">Supplier</span>
      </div>
    </div>
  </div>
</aside>

<div id="sidebarOverlay" class="sidebar-overlay d-lg-none"></div>

<div class="main-wrapper" id="mainWrapper">
  <header class="topnav" id="topnav">
    <div class="topnav-left">
      <button class="btn topnav-toggle" id="sidebarToggle" type="button">
        <i class="fa-solid fa-bars"></i>
      </button>
      <div class="topnav-breadcrumb" id="topnavBreadcrumb">
        <i class="fa-solid fa-gauge-high me-2 text-primary-brand"></i>
        <span>Dashboard</span>
      </div>
    </div>

    <div class="topnav-center d-none d-md-flex">
      <div class="global-search-wrap search-container">
        <i class="fa-solid fa-magnifying-glass search-icon"></i>
        <input type="text" id="globalSearch" class="form-control global-search" placeholder="Search orders, products, documents…">
        <div id="searchResults" class="search-dropdown search-results"></div>
      </div>
    </div>

    <div class="topnav-right">
      <span class="topnav-update d-none d-md-flex">
        <i class="fa-regular fa-calendar me-1"></i>
        <span id="lastUpdate">-</span>
      </span>

      <button class="btn topnav-icon-btn" id="refreshData" title="Refresh Data" type="button">
        <i class="fa-solid fa-arrows-rotate"></i>
      </button>

      <button class="btn topnav-icon-btn" id="themeToggle" title="Toggle Dark Mode" type="button">
        <i class="fa-solid fa-moon" id="themeIcon"></i>
      </button>

      <button class="btn topnav-icon-btn position-relative" id="notificationBtn" title="Notifications" type="button">
        <i class="fa-solid fa-bell"></i>
        <span class="notif-dot" id="notificationBadge" style="display:none"></span>
      </button>

      <div class="notif-dropdown" id="notifDropdown">
        <div class="notif-header">
          <strong>Notifications</strong>
        </div>
        <div class="notif-list" id="notificationsList">
          <div class="notif-item"><div class="notif-content"><p class="text-muted mb-0">No notifications</p></div></div>
        </div>
      </div>

      <div class="topnav-profile" id="logoutBtn" title="Sign out">
        <div class="profile-avatar" id="profileInitials">WV</div>
        <div class="profile-info d-none d-md-block">
          <span class="profile-name" id="profileName">WAVE VI</span>
          <span class="profile-role" id="profileRole">Administrator</span>
        </div>
      </div>
    </div>
  </header>

  <main class="page-content main-content" id="mainContent"></main>
</div>

</div><!-- /appShell -->

<div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastContainer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
</body>
</html>
